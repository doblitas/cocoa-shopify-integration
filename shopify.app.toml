# Configuración de la app para Shopify CLI (shopify app dev / shopify app deploy).
# client_id: puedes dejar el placeholder; al desplegar usa `npm run shopify:deploy` (pasa --client-id desde .env.local).
# Si cambias de dominio, actualiza application_url, [auth].redirect_urls y (opcional) SHOPIFY_APP_HOST en Vercel.

name = "Cocoa Integration"
client_id = "REPLACE_WITH_CLIENT_ID"
application_url = "https://cocoa-shopify-integration.vercel.app/dashboard"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_inventory"

[auth]
redirect_urls = [
  "https://cocoa-shopify-integration.vercel.app/api/auth/callback",
]

[webhooks]
api_version = "2024-10"

[[webhooks.subscriptions]]
topics = [ "products/create", "products/update" ]
uri = "/api/webhooks/shopify/products"

[build]
automatically_update_urls_on_dev = false
